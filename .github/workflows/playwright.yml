name: Playwright Tests

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '59 17 * * 5'  # Friday 23:59 UTC+6

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test